<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>品保系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* 這裡保留原本的 CSS 樣式，為了簡潔在此省略，實際檔案中應包含完整 CSS */
body { font-family: system-ui, sans-serif; padding: 20px; }
.btn { padding: 8px 16px; cursor: pointer; }
.log { margin-top: 20px; padding: 10px; background: #f0f0f0; border: 1px solid #ccc; white-space: pre-wrap; }
</style>
</head>
<body>

<h1>品保系統 - Google Sheets 同步測試版</h1>

<div>
  <label for="scriptUrl">Google Apps Script Web App URL:</label><br>
  <input type="text" id="scriptUrl" style="width: 100%; padding: 8px;" placeholder="請輸入部署後的 Web App URL">
</div>

<div style="margin-top: 20px;">
  <button class="btn" onclick="fetchData()">從 Google Sheets 讀取資料</button>
  <button class="btn" onclick="saveTestData()">儲存測試資料到 Google Sheets</button>
</div>

<div class="log" id="logArea">日誌輸出區域...</div>

<script>
// 產生 UUID 的輔助函數
function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function log(msg) {
  const logArea = document.getElementById('logArea');
  logArea.textContent += '\n' + new Date().toLocaleTimeString() + ': ' + msg;
}

async function fetchData() {
  const url = document.getElementById('scriptUrl').value;
  if (!url) {
    alert('請先輸入 Web App URL');
    return;
  }

  log('開始讀取資料...');
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const data = await response.json();
    log('讀取成功: ' + JSON.stringify(data, null, 2));
    // 在這裡可以將讀取到的資料更新到前端的變數中 (例如 ctRecords, angRecords)
  } catch (error) {
    log('讀取失敗: ' + error.message);
  }
}

async function saveTestData() {
  const url = document.getElementById('scriptUrl').value;
  if (!url) {
    alert('請先輸入 Web App URL');
    return;
  }

  const testRecord = {
    action: 'save',
    sheetName: 'DailyQA',
    data: {
      UUID: generateUUID(),
      Date: new Date().toISOString().split('T')[0],
      Room: 'R1',
      Staff: '測試員',
      OverallResult: 'Pass',
      Note: '這是一筆測試資料'
    }
  };

  log('開始儲存資料...');
  try {
    const response = await fetch(url, {
      method: 'POST',
      // 使用 text/plain 避免 CORS preflight
      headers: {
        'Content-Type': 'text/plain;charset=utf-8',
      },
      body: JSON.stringify(testRecord)
    });
    
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const result = await response.json();
    log('儲存成功: ' + JSON.stringify(result));
  } catch (error) {
    log('儲存失敗: ' + error.message);
  }
}

// 實際應用中，需要將原本的 saveState(), loadState() 等函數替換為類似上述的 fetch 呼叫
// 例如：
// async function saveStateGS_ct() {
//   const payload = { action: 'syncAll', sheetName: 'CT_Records', data: ctRecords };
//   await fetch(scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
// }
</script>

</body>
</html>
